# Ruler Configuration File
# See https://github.com/intellectronica/ruler for documentation.

# Agents to generate rules for
default_agents = ["cursor", "claude", "opencode"]

# Enable nested rule loading from nested .ruler directories
# nested = false

# --- Agent Specific Configurations ---

[agents.claude]
enabled = true
output_path = ".claude/CLAUDE.md"

[agents.cursor]
enabled = true

[agents.opencode]
enabled = true

[agents.kimi]
enabled = true
